services:

  db:
    image: postgres:16-alpine
    container_name: ethara-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: EtharaAI
      POSTGRES_DB: inventory_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: ethara-backend

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:EtharaAI@db:5432/inventory_db

    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend

    container_name: ethara-frontend

    depends_on:
      - backend

    environment:
      REACT_APP_API_URL: http://localhost:8000

    ports:
      - "3000:3000"

volumes:
  postgres_data:
